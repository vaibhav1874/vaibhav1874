<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#04040f"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="footLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#00d4ff;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="75%" style="stop-color:#7b2ff7;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
    <filter id="footGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="footClip">
      <rect width="900" height="220" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#footClip)">
    <rect width="900" height="220" fill="url(#footBg)"/>

    <!-- Top divider -->
    <rect x="0" y="0" width="900" height="2" fill="url(#footLine)"/>

    <!-- Background glow elements -->
    <ellipse cx="450" cy="110" rx="400" ry="80" fill="#7b2ff7" opacity="0.04"/>
    <ellipse cx="200" cy="110" rx="200" ry="60" fill="#00d4ff" opacity="0.03"/>
    <ellipse cx="700" cy="110" rx="200" ry="60" fill="#a855f7" opacity="0.03"/>

    <!-- Circuit pattern -->
    <line x1="50" y1="50" x2="130" y2="50" stroke="#ffffff06" stroke-width="1"/>
    <line x1="130" y1="50" x2="130" y2="90" stroke="#ffffff06" stroke-width="1"/>
    <line x1="50" y1="50" x2="50" y2="90" stroke="#ffffff06" stroke-width="1"/>
    <circle cx="130" cy="50" r="2" fill="#00d4ff" opacity="0.2"/>
    <circle cx="50" cy="50" r="2" fill="#00d4ff" opacity="0.2"/>

    <line x1="770" y1="50" x2="850" y2="50" stroke="#ffffff06" stroke-width="1"/>
    <line x1="770" y1="50" x2="770" y2="90" stroke="#ffffff06" stroke-width="1"/>
    <line x1="850" y1="50" x2="850" y2="90" stroke="#ffffff06" stroke-width="1"/>
    <circle cx="770" cy="50" r="2" fill="#7b2ff7" opacity="0.2"/>
    <circle cx="850" cy="50" r="2" fill="#7b2ff7" opacity="0.2"/>

    <!-- Center logo / monogram -->
    <circle cx="450" cy="80" r="30" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <circle cx="450" cy="80" r="22" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.4"/>
    <text x="450" y="85" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#a855f7" opacity="0.9">VG</text>

    <!-- Name -->
    <text x="450" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="6" opacity="0.9">VAIBHAV GURJAR</text>

    <!-- Tagline -->
    <text x="450" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="2">AI Engineer · Builder · Creator</text>

    <!-- Bottom links -->
    <text x="450" y="180" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#334155" letter-spacing="1">github.com/vaibhav1874  ·  vaibhavgurjar900@gmail.com</text>

    <!-- Thank you -->
    <text x="450" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e293b" letter-spacing="2">⭐ Thanks for visiting · Built with passion</text>

    <!-- Neon dots bottom corners -->
    <circle cx="30" cy="200" r="2" fill="#00d4ff" opacity="0.4"/>
    <circle cx="870" cy="200" r="2" fill="#7b2ff7" opacity="0.4"/>
  </g>
</svg>
