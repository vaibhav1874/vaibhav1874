<svg width="900" height="100" viewBox="0 0 900 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&amp;display=swap');
      .typing-text {
        font-family: 'Poppins', 'Arial', sans-serif;
        font-size: 28px;
        font-weight: 600;
        fill: #ffffff;
      }
      .cursor {
        fill: #00d4ff;
      }
    </style>
    <linearGradient id="typBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#04040f;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#04040f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="typText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>

  <rect width="900" height="100" fill="url(#typBg)"/>

  <!-- Animated typing text using SMIL animations -->
  <text x="450" y="60" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="600" fill="url(#typText)">
    <tspan>
      <animate attributeName="visibility"
        values="visible;hidden;hidden;hidden;hidden;hidden"
        dur="12s" repeatCount="indefinite"/>
      AI Engineer &amp; Builder
    </tspan>
    <tspan>
      <animate attributeName="visibility"
        values="hidden;visible;hidden;hidden;hidden;hidden"
        dur="12s" repeatCount="indefinite"/>
      Machine Learning Enthusiast
    </tspan>
    <tspan>
      <animate attributeName="visibility"
        values="hidden;hidden;visible;hidden;hidden;hidden"
        dur="12s" repeatCount="indefinite"/>
      Full Stack Developer
    </tspan>
    <tspan>
      <animate attributeName="visibility"
        values="hidden;hidden;hidden;visible;hidden;hidden"
        dur="12s" repeatCount="indefinite"/>
      Open Source Learner
    </tspan>
    <tspan>
      <animate attributeName="visibility"
        values="hidden;hidden;hidden;hidden;visible;hidden"
        dur="12s" repeatCount="indefinite"/>
      Product Builder
    </tspan>
    <tspan>
      <animate attributeName="visibility"
        values="hidden;hidden;hidden;hidden;hidden;visible"
        dur="12s" repeatCount="indefinite"/>
      Crafting the Future with AI
    </tspan>
  </text>

  <!-- Cursor blink -->
  <rect x="680" y="40" width="3" height="28" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
