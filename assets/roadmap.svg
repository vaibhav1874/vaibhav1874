  <circle cx="364" cy="240" r="22" fill="#ef4444" opacity="0.12"/>
  <circle cx="364" cy="240" r="16" fill="#ef4444" opacity="0.2"/>
  <circle cx="364" cy="240" r="10" fill="#ef4444" opacity="0.7" filter="url(#nodeGlow)"/>
