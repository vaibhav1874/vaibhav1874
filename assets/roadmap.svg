  <text x="506" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Planned</text>

  <!-- Node: Research -->
  <circle cx="648" cy="370" r="22" fill="#6b7280" opacity="0.08"/>
  <circle cx="648" cy="370" r="16" fill="#6b7280" opacity="0.12"/>
  <circle cx="648" cy="370" r="10" fill="#6b7280" opacity="0.4"/>
  <text x="648" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6b7280">Research</text>
