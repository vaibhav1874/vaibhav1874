  <circle cx="222" cy="240" r="22" fill="#6b7280" opacity="0.12"/>
  <circle cx="222" cy="240" r="16" fill="#6b7280" opacity="0.2"/>
  <circle cx="222" cy="240" r="10" fill="#6b7280" opacity="0.6" filter="url(#nodeGlow)"/>
