  <circle cx="222" cy="370" r="22" fill="#6b7280" opacity="0.08"/>
  <circle cx="222" cy="370" r="16" fill="#6b7280" opacity="0.12"/>
  <circle cx="222" cy="370" r="10" fill="#6b7280" opacity="0.4"/>
  <text x="222" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6b7280">LLMs</text>
  <rect x="192" y="386" width="60" height="16" rx="8" fill="#6b728015"/>
  <text x="222" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Planned</text>

  <!-- Node: AI Agents -->
  <circle cx="364" cy="370" r="22" fill="#6b7280" opacity="0.08"/>
  <circle cx="364" cy="370" r="16" fill="#6b7280" opacity="0.12"/>
  <circle cx="364" cy="370" r="10" fill="#6b7280" opacity="0.4"/>
  <text x="364" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6b7280">AI Agents</text>
  <rect x="322" y="386" width="84" height="16" rx="8" fill="#6b728015"/>
  <text x="364" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Planned</text>

  <!-- Node: MLOps -->
  <circle cx="506" cy="370" r="22" fill="#6b7280" opacity="0.08"/>
  <circle cx="506" cy="370" r="16" fill="#6b7280" opacity="0.12"/>
  <circle cx="506" cy="370" r="10" fill="#6b7280" opacity="0.4"/>
  <text x="506" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6b7280">MLOps</text>
