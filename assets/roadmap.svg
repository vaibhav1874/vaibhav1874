  <text x="222" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Exploring</text>

  <!-- Connector start of row 3 -->
  <circle cx="80" cy="240" r="22" fill="#6b7280" opacity="0.12"/>
  <circle cx="80" cy="240" r="16" fill="#6b7280" opacity="0.2"/>
  <circle cx="80" cy="240" r="10" fill="#6b7280" opacity="0.6" filter="url(#nodeGlow)"/>
  <text x="80" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6b7280">NLP</text>
  <rect x="50" y="256" width="60" height="16" rx="8" fill="#6b728020"/>
  <text x="80" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Exploring</text>

  <!-- ROW 3 ─────────────────────────────────────────────── -->

  <!-- Node: Gen AI -->
  <circle cx="80" cy="370" r="22" fill="#6b7280" opacity="0.08"/>
  <circle cx="80" cy="370" r="16" fill="#6b7280" opacity="0.12"/>
  <circle cx="80" cy="370" r="10" fill="#6b7280" opacity="0.4"/>
  <text x="80" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#6b7280">GenAI</text>
