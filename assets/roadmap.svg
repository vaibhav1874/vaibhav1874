  <circle cx="648" cy="110" r="22" fill="#f59e0b" opacity="0.12"/>
  <circle cx="648" cy="110" r="16" fill="#f59e0b" opacity="0.2"/>
  <circle cx="648" cy="110" r="10" fill="#f59e0b" opacity="0.8" filter="url(#nodeGlow)"/>
  <text x="648" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Statistics</text>
  <rect x="610" y="126" width="76" height="16" rx="8" fill="#f59e0b20"/>
  <text x="648" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Learning</text>

  <!-- Node 6 (connector): Scikit-Learn -->
  <circle cx="790" cy="110" r="22" fill="#f59e0b" opacity="0.12"/>
  <circle cx="790" cy="110" r="16" fill="#f59e0b" opacity="0.2"/>
  <circle cx="790" cy="110" r="10" fill="#f59e0b" opacity="0.8" filter="url(#nodeGlow)"/>
  <text x="790" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Scikit-Learn</text>
  <rect x="752" y="126" width="76" height="16" rx="8" fill="#f59e0b20"/>
  <text x="790" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Learning</text>

