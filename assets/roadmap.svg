  <text x="648" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Planned</text>

  <!-- Legend -->
  <rect x="40" y="445" width="12" height="12" rx="6" fill="#00d4ff"/>
  <text x="58" y="455" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Intermediate</text>
  <rect x="170" y="445" width="12" height="12" rx="6" fill="#a855f7"/>
  <text x="188" y="455" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Building</text>
  <rect x="280" y="445" width="12" height="12" rx="6" fill="#f59e0b"/>
  <text x="298" y="455" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Learning</text>
  <rect x="385" y="445" width="12" height="12" rx="6" fill="#ef4444"/>
  <text x="403" y="455" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Exploring</text>
  <rect x="490" y="445" width="12" height="12" rx="6" fill="#6b7280"/>
  <text x="508" y="455" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Planned</text>
