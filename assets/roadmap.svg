<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roadBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#04040e"/>
      <stop offset="100%" style="stop-color:#08081a"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Status colors -->
    <!-- Intermediate = cyan, Building = purple, Learning = yellow, Exploring = orange, Planned = gray -->
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#roadBg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="4">ML JOURNEY</text>
  <rect x="360" y="50" width="180" height="1" fill="url(#pathGrad)" opacity="0.6"/>

  <!-- Path line (horizontal snake) -->
  <!-- Row 1: nodes 1-5 left to right -->
  <path d="M 80,110 L 790,110" stroke="url(#pathGrad)" stroke-width="2" fill="none" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Connector row 1 to row 2 -->
  <path d="M 790,110 Q 820,110 820,140 L 820,210 Q 820,240 790,240" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Row 2: nodes 6-10 right to left -->
  <path d="M 790,240 L 80,240" stroke="url(#pathGrad)" stroke-width="2" fill="none" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Connector row 2 to row 3 -->
  <path d="M 80,240 Q 50,240 50,270 L 50,340 Q 50,370 80,370" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Row 3: nodes 11-15 left to right -->
  <path d="M 80,370 L 650,370" stroke="url(#pathGrad)" stroke-width="2" fill="none" opacity="0.4" filter="url(#lineGlow)"/>

  <!-- ROW 1 ─────────────────────────────────────────────── -->

  <!-- Node 1: Python -->
  <circle cx="80" cy="110" r="22" fill="#00d4ff" opacity="0.15"/>
  <circle cx="80" cy="110" r="16" fill="#00d4ff" opacity="0.25"/>
  <circle cx="80" cy="110" r="10" fill="#00d4ff" filter="url(#nodeGlow)"/>
  <text x="80" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#00d4ff">Python</text>
  <rect x="48" y="126" width="64" height="16" rx="8" fill="#00d4ff20"/>
  <text x="80" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff">Intermediate</text>

  <!-- Node 2: Pandas -->
  <circle cx="222" cy="110" r="22" fill="#00d4ff" opacity="0.12"/>
  <circle cx="222" cy="110" r="16" fill="#00d4ff" opacity="0.2"/>
  <circle cx="222" cy="110" r="10" fill="#00d4ff" opacity="0.8" filter="url(#nodeGlow)"/>
  <text x="222" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#00d4ff">Pandas</text>
  <rect x="190" y="126" width="64" height="16" rx="8" fill="#00d4ff20"/>
  <text x="222" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#00d4ff">Intermediate</text>

  <!-- Node 3: NumPy -->
  <circle cx="364" cy="110" r="22" fill="#a855f7" opacity="0.12"/>
  <circle cx="364" cy="110" r="16" fill="#a855f7" opacity="0.2"/>
  <circle cx="364" cy="110" r="10" fill="#a855f7" opacity="0.8" filter="url(#nodeGlow)"/>
  <text x="364" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#a855f7">NumPy</text>
  <rect x="332" y="126" width="64" height="16" rx="8" fill="#a855f720"/>
  <text x="364" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a855f7">Intermediate</text>

  <!-- Node 4: Matplotlib -->
  <circle cx="506" cy="110" r="22" fill="#a855f7" opacity="0.12"/>
  <circle cx="506" cy="110" r="16" fill="#a855f7" opacity="0.2"/>
  <circle cx="506" cy="110" r="10" fill="#a855f7" opacity="0.8" filter="url(#nodeGlow)"/>
